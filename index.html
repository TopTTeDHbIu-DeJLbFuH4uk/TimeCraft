<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap');
    </style>
    <title>TimeCraft</title>
    <link rel="icon" href="./assets/browser_tab/logo.svg">
    <!-- STYLES -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/create-new-task.css">
</head>
<body>

<main class="main-container">
    <div class="task-form">
        <header class="task-header">
            <h1 class="header">New task</h1>

            <div class="add-field-wrapper">
                <button class="add-btn add-field">Add field</button>
                <div class="close-icon"></div>
            </div>
        </header>

        <div class="task-details-container">
            <div class="task-details">
                <div class="task-name-wrapper">
                    <label class="task-heading">Name task:</label>
                    <input type="text"
                           placeholder="Task"
                           class="input-task"
                    >
                </div>

                <div class="task-pattern">
                    <h2 class="task-heading">Pattern:</h2>

                    <select class="task-select"
                            name=""
                            id="task-pattern">

                        <option value="">Standard</option>
                    </select>

                    <button class="add-btn add-pattern">Add pattern</button>
                </div>

                <div class="task-status">
                    <h2 class="task-heading">Status:</h2>

                    <select class="task-select"
                            name=""
                            id="task-status">

                        <option value="">Draft</option>
                    </select>
                </div>

                <div class="task-description">
                    <h2 class="task-heading">Description:</h2>
                    <textarea name="" id="" cols="3" rows="3"></textarea>
                </div>
            </div>

            <section class="participants-section">
                <h2 class="task-heading">Participants:</h2>
                <h3 class="task-heading">Executor:</h3>
                <button class="add-btn add-participant">Add</button>
            </section>

            <div class="task-heading">Planned completion date:</div>
        </div>

        <footer class="btn-container">
            <button class="btn btn-save">Save</button>
            <button class="btn btn-cancel">Cancel</button>
        </footer>
    </div>
</main>

</body>
</html>
