<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap');
    </style>
    <title>TimeCraft</title>
    <link rel="icon" href="./assets/browser_tab/logo.svg">
    <!-- STYLES -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/list-of-tasks.css">
</head>
<body>

<main class="main-container">
    <header class="header">
        <h1 class="tasks">Задачи</h1>

        <nav class="nav-container">
            <a href="create-task.html" class="change-task-btn btn-create-task">
                <button>Создать задачу</button>
            </a>

            <a href="#" class="change-task-btn btn-go-to-task">
                <button>Перейти к задаче</button>
            </a>

            <div class="quick-search-container">
                <input type="text" placeholder="Поиск..." class="quick-search">
            </div>

            <div class="select-by-container">
                <p>Сортировать по:</p>
                <select name="" id="select-by" class="select-by">
                    <option value="">Выбрать</option>
                    <option value="">Названию</option>
                    <option value="">Дате</option>
                    <option value="">Времени</option>
                </select>
            </div>
        </nav>
    </header>

    <div class="table-container">
        <table class="table">
            <thead>
            <tr class="table-header">
                <th>
                    <input type="checkbox" class="checkbox">
                </th>
                <th>Название</th>
                <th>Описание</th>
                <th>Дата начала</th>
                <th>Дата окончания</th>
            </tr>
            </thead>

            <tbody class="table-body">
<!--            <tr>-->
<!--                <th>-->
<!--                    <input type="checkbox" class="checkbox">-->
<!--                </th>-->
<!--                <th>console</th>-->
<!--                <th>log</th>-->
<!--                <th>02.02.2025</th>-->
<!--                <th>02.02.2026</th>-->
<!--            </tr>-->
            </tbody>
        </table>
    </div>
    <p class="message">У вас ещё нет задачи. Попробуйте создать новую.</p>
</main>

<script src="frontend/create-task.js"></script>
</body>
</html>
