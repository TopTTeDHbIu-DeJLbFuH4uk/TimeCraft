<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap');
    </style>
    <title>TimeCraft</title>
    <link rel="icon" href="./assets/browser_tab/logo.svg">
    <!-- SCRIPTS -->
    <script defer src="frontend/render-task.js"></script>
    <!-- STYLES -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/list-of-tasks.css">
</head>
<body>

<main class="container">
    <header>
        <h1 class="logo">TimeCraft</h1>
        <h2 class="title">Задачи N</h2>

        <nav class="nav-container">
            <button class="create-task-btn btn">Создать задачу</button>
            <button class="go-to-task-btn btn">Перейти к задаче</button>
            <button class="delete-btn btn">Удалить выбранные</button>

            <div class="quick-search-container">
                <input class="quick-search" type="text" placeholder="Поиск...">
            </div>

            <div class="sorting-container">
                <p>Сортировать по:</p>
                <select class="select-by" id="select-by">
                    <option value="">Выбрать</option>
                    <option value="">Названию</option>
                    <option value="">Дате</option>
                    <option value="">Времени</option>
                </select>
            </div>
        </nav>
    </header>

    <div class="table-container">
        <table class="table">
            <thead>
            <tr class="table-header">
                <th>
                    <input type="checkbox" class="checkbox">
                </th>
                <th data-id="title">Название</th>
                <th data-id="description">Описание</th>
                <th data-id="startDate">Дата начала</th>
                <th data-id="endDate">Дата окончания</th>
            </tr>
            </thead>

            <tbody class="table-body"></tbody>
        </table>
    </div>
    <div class="message">У вас ещё нет задачи. Попробуйте создать новую.</div>
</main>

</body>
</html>
